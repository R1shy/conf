format = """
[оӮ¶](nord0)\
$username\
[@](bg:nord0 fg:nord4)\
$hostname\
$os\
[оӮ°](bg:nord1 fg:nord0)\
$directory\
[оӮ°](bg:nord2 fg:nord1)\
$git_branch\
$git_status\
$git_metrics\
[оӮ°](bg:nord3 fg:nord2)\
$c\
$elixir\
$elm\
$golang\
$python\
$gradle\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$rust\
$scala\
$status
"""

scan_timeout = 50
command_timeout = 1000
add_newline = true
palette = 'nord'

[palettes.nord]
nord0 = '#2E3440'
nord1 = '#3B4252'
nord2 = '#434C5E'
nord3 = '#4C566A'
nord4 = '#D8DEE9'
nord11 = '#BF616A'
nord13 = '#EBCB8B'
nord14 = '#A2BE8A'

# username, host and OS
[username]
style_root = 'bg:nord0 fg:nord11'
style_user = 'bg:nord0 fg:nord4'
format = '[$user]($style)'
show_always = true
disabled = false

[hostname]
ssh_only = false
ssh_symbol = ' о¬Ғ'
trim_at = '.'
format = '[$hostname$ssh_symbol]($style)'
style = 'bg:nord0 fg:nord4'
disabled = false

[os]
format = '[ $symbol ]($style)'
style = 'bg:nord0 fg:nord4'
disabled = false

[directory]
truncation_length = 1
truncate_to_repo = true
format = '[ $path ]($style)[$read_only]($read_only_style)'
style = 'bg:nord1 fg:nord4'
disabled = false
read_only = ' у°Ңҫ '
read_only_style = 'bg:nord1 fg:nord11'
truncation_symbol = ''

[directory.substitutions]
'Documents' = 'у°Ҳҷ'
'Dokumente' = 'у°Ҳҷ'
'Downloads' = 'пҖҷ '
'Music' = 'пҖҒ '
'Musik' = 'пҖҒ '
'Pictures' = 'пҖҫ '
'Bilder' = 'пҖҫ '
'Projects' = 'оҜҹ '

# git
[git_branch]
symbol = 'пҗҳ'
style = 'bg:nord2 fg:nord4'
format = '[ $symbol $branch ]($style)'

[git_status]
style = 'bg:nord2 fg:nord4'
format = '[$all_status$ahead_behind ]($style)'

[git_metrics]
added_style = 'bg:nord2 fg:nord14'
deleted_style = 'bg:nord2 fg:nord11'
format = '[+$added ]($added_style)[-$deleted ]($deleted_style)'
disabled = false

# programming
[c]
symbol = 'оҳһ '
style = 'bg:nord3 fg:nord4'
format = '[ $symbol ($version) ]($style)'

[elixir]
symbol = 'оүө '
style = 'bg:nord3 fg:nord4'
format = '[ $symbol ($version) ]($style)'

[elm]
symbol = 'оҳ¬ '
style = 'bg:nord3 fg:nord4'
format = '[ $symbol ($version) ]($style)'

[golang]
symbol = 'оҳ§ '
style = 'bg:nord3 fg:nord4'
format = '[ $symbol ($version) ]($style)'

[python]
symbol = 'оңј '
style = 'bg:nord3 fg:nord4'
format = '[ $symbol ($version) (\($virtualenv\)) ]($style)'

[gradle]
style = 'bg:nord3 fg:nord4'
format = '[ $symbol ($version) ]($style)'

[haskell]
symbol = 'оқ· '
style = 'bg:nord3 fg:nord4'
format = '[ $symbol ($version) ]($style)'

[java]
symbol = 'оү– '
style = 'bg:nord3 fg:nord4'
format = '[ $symbol ($version) ]($style)'

[julia]
symbol = 'оҳӨ '
style = 'bg:nord3 fg:nord4'
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = 'оңҳ'
style = 'bg:nord3 fg:nord4'
format = '[ $symbol ($version) ]($style)'

[nim]
symbol = 'у°ҶҘ '
style = 'bg:nord3 fg:nord4'
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = 'оһЁ'
style = 'bg:nord3 fg:nord4'
format = '[ $symbol ($version) ]($style)'

[scala]
symbol = 'оң· '
style = 'bg:nord3 fg:nord4'
format = '[ $symbol ($version) ]($style)'

# status
[status]
format = '[ $symbol ]($style)'
style = "bold"
symbol = '[п‘§](fg:nord11)'
success_symbol = '[оӘІ](fg:nord14)'
not_executable_symbol = '[рҹӣҮ](fg:nord11)'
not_found_symbol = '[у°Қү](fg:nord11)'
sigint_symbol = '[оҖҠ](fg:nord13)'
signal_symbol = '[оҖҠ](fg:nord11)'
disabled = false

